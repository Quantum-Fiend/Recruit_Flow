version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recruitflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recruitflow
    volumes:
      - recruitflow-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruitflow-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/recruitflow?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=development_fallback_secret_replace_in_production
    depends_on:
      - db
    restart: always

volumes:
  recruitflow-db-data:
